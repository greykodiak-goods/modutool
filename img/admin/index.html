<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>백오피스 · 결과 통계 | ThisIsMyIMG</title>
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://greykodiak-goods.github.io/modutool/img/admin/">
<script>window.MDTL_SITE_BRAND="ThisIsMyIMG";window.MDTL_SITE_MARK="I";</script>
<script>window.MDTL_BASE='/modutool/img';</script>
<link rel="stylesheet" href="/modutool/img/assets/site.css">
<script src="/modutool/img/assets/site.js"></script>
<script src="/modutool/img/assets/auth-config.js"></script>
<script src="/modutool/img/assets/auth.js"></script>
<style>
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin:16px 0; }
  .kpi { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; }
  .kpi .n { font-size:26px; font-weight:800; line-height:1.1; }
  .kpi .l { font-size:12.5px; color:var(--text-soft); margin-top:4px; }
  .kpi.warn .n { color:var(--danger); }
  .sect { margin:26px 0 8px; font-size:16px; font-weight:700; }
  .sect small { font-weight:400; color:var(--text-soft); font-size:12.5px; margin-left:6px; }
  .tblwrap { overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius); }
  table.bo { width:100%; border-collapse:collapse; font-size:13.5px; min-width:520px; }
  table.bo th, table.bo td { padding:9px 12px; text-align:left; border-bottom:1px solid var(--line); white-space:nowrap; }
  table.bo th { background:var(--surface); font-weight:600; color:var(--text-soft); font-size:12px; text-transform:uppercase; letter-spacing:.02em; }
  table.bo tr:last-child td { border-bottom:0; }
  table.bo td.num, table.bo th.num { text-align:right; font-variant-numeric:tabular-nums; }
  .bar { position:relative; height:8px; background:var(--line); border-radius:6px; overflow:hidden; min-width:80px; }
  .bar > span { position:absolute; left:0; top:0; bottom:0; background:var(--danger); border-radius:6px; }
  .tag { display:inline-block; font-size:11.5px; font-weight:700; padding:2px 8px; border-radius:999px; }
  .tag.error { background:rgba(220,38,38,.12); color:var(--danger); }
  .tag.no_result { background:rgba(217,119,6,.14); color:var(--warn); }
  .tag.unsupported { background:rgba(100,116,139,.16); color:var(--text-soft); }
  .tag.cancelled { background:rgba(100,116,139,.16); color:var(--text-soft); }
  .tag.success { background:rgba(22,163,74,.14); color:var(--ok); }
  .daily { display:flex; align-items:flex-end; gap:3px; height:70px; padding:6px 2px 0; overflow-x:auto; }
  .daily .col { flex:0 0 auto; width:14px; display:flex; flex-direction:column; justify-content:flex-end; height:100%; }
  .daily .col i { display:block; width:100%; background:var(--accent-soft); border-radius:2px 2px 0 0; }
  .daily .col i.f { background:var(--danger); border-radius:0 0 2px 2px; }
  .rng { display:flex; gap:6px; flex-wrap:wrap; }
  .rng button { font-size:13px; padding:6px 12px; border:1px solid var(--line); background:var(--surface); color:var(--text); border-radius:9px; cursor:pointer; }
  .rng button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .muted { color:var(--text-soft); font-size:13px; }
  code.meta { font-size:11.5px; color:var(--text-soft); }
</style>
</head>
<body>
<header id="site-header" class="site-header"></header>
<main>
  <h1 class="page-title">백오피스 · 결과 통계</h1>
  <p class="page-sub">고객이 원하는 결과를 얻지 못한 순간(오류·미달성)을 익명 집계해 개선 우선순위를 잡습니다. 파일·개인정보는 저장하지 않고 도구·결과유형·사유·크기버킷 등 비식별 메타만 기록합니다.</p>

  <div class="rng" id="rng">
    <button data-d="7">최근 7일</button>
    <button data-d="30" class="on">30일</button>
    <button data-d="90">90일</button>
    <button data-d="365">1년</button>
  </div>

  <div id="loading" class="muted" style="margin:18px 0">불러오는 중…</div>
  <div id="denied" style="display:none" class="card"></div>
  <div id="dash" style="display:none"></div>
</main>
<footer id="site-footer" class="site-footer"></footer>

<script src="/modutool/img/assets/vendor/supabase.js"></script>
<script>
(function () {
  var days = 30, sb = null;
  var loading = document.getElementById('loading');
  var denied = document.getElementById('denied');
  var dash = document.getElementById('dash');

  function esc(s) { var d = document.createElement('div'); d.textContent = (s == null ? '' : String(s)); return d.innerHTML; }
  function n(x) { return (x == null ? 0 : x).toLocaleString('ko-KR'); }
  function pct(a, b) { return b ? Math.round((a / b) * 100) : 0; }

  document.getElementById('rng').addEventListener('click', function (e) {
    var b = e.target.closest('button'); if (!b) return;
    days = parseInt(b.dataset.d, 10) || 30;
    Array.prototype.forEach.call(this.querySelectorAll('button'), function (x) { x.classList.toggle('on', x === b); });
    load();
  });

  async function load() {
    loading.style.display = ''; denied.style.display = 'none'; dash.style.display = 'none';
    loading.textContent = '불러오는 중…';
    var r = await sb.rpc('mdtl_tool_dashboard', { days: days });
    if (r.error) {
      loading.style.display = 'none';
      denied.style.display = '';
      var msg = /not authorized|42501|permission/i.test(r.error.message || '')
        ? '이 계정은 관리자로 등록되어 있지 않습니다. 관리자 이메일로 로그인하거나, DB의 <code>admin_users</code>에 이메일을 추가하세요.'
        : ('통계를 불러오지 못했습니다: ' + esc(r.error.message || 'unknown'));
      denied.innerHTML = '<div class="result show error" style="margin:0">🔒 ' + msg + '</div>';
      return;
    }
    render(r.data || {});
  }

  function render(d) {
    loading.style.display = 'none';
    dash.style.display = '';
    var total = d.total || 0, fail = d.fail_total || 0;
    var byOut = d.by_outcome || {};
    var tools = d.by_tool || [];
    var reasons = d.top_reasons || [];
    var daily = d.daily || [];
    var recent = d.recent || [];

    var html = '';

    // KPIs
    html += '<div class="kpis">';
    html += '<div class="kpi"><div class="n">' + n(total) + '</div><div class="l">전체 이벤트</div></div>';
    html += '<div class="kpi warn"><div class="n">' + n(fail) + '</div><div class="l">미달성·오류</div></div>';
    html += '<div class="kpi"><div class="n">' + pct(fail, total) + '%</div><div class="l">실패율</div></div>';
    html += '<div class="kpi"><div class="n">' + n(tools.length) + '</div><div class="l">기록된 도구 수</div></div>';
    html += '</div>';

    // outcome chips
    var chips = ['error', 'no_result', 'unsupported', 'cancelled', 'success'];
    html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 2px">';
    chips.forEach(function (k) {
      if (byOut[k]) html += '<span class="tag ' + k + '">' + k + ' · ' + n(byOut[k]) + '</span>';
    });
    html += '</div>';

    // by tool
    html += '<div class="sect">도구별 결과 <small>실패 많은 순</small></div>';
    if (!tools.length) { html += '<p class="muted">데이터 없음</p>'; }
    else {
      html += '<div class="tblwrap"><table class="bo"><thead><tr>' +
        '<th>도구</th><th class="num">전체</th><th class="num">성공</th><th class="num">실패</th><th class="num">실패율</th><th>비율</th>' +
        '</tr></thead><tbody>';
      tools.forEach(function (t) {
        var fr = pct(t.failed, t.total);
        html += '<tr><td><b>' + esc(t.tool) + '</b></td>' +
          '<td class="num">' + n(t.total) + '</td>' +
          '<td class="num">' + n(t.success) + '</td>' +
          '<td class="num">' + n(t.failed) + '</td>' +
          '<td class="num">' + fr + '%</td>' +
          '<td><div class="bar"><span style="width:' + fr + '%"></span></div></td></tr>';
      });
      html += '</tbody></table></div>';
    }

    // top reasons
    html += '<div class="sect">상위 미달성·오류 사유</div>';
    if (!reasons.length) { html += '<p class="muted">데이터 없음</p>'; }
    else {
      html += '<div class="tblwrap"><table class="bo"><thead><tr>' +
        '<th>도구</th><th>결과</th><th>사유</th><th class="num">건수</th></tr></thead><tbody>';
      reasons.forEach(function (r) {
        html += '<tr><td><b>' + esc(r.tool) + '</b></td>' +
          '<td><span class="tag ' + esc(r.outcome) + '">' + esc(r.outcome) + '</span></td>' +
          '<td>' + esc(r.reason) + '</td>' +
          '<td class="num">' + n(r.c) + '</td></tr>';
      });
      html += '</tbody></table></div>';
    }

    // daily trend
    html += '<div class="sect">일별 추이 <small>회색=전체, 빨강=실패</small></div>';
    if (!daily.length) { html += '<p class="muted">데이터 없음</p>'; }
    else {
      var max = daily.reduce(function (m, x) { return Math.max(m, x.total || 0); }, 1);
      html += '<div class="daily">';
      daily.forEach(function (x) {
        var okH = Math.round(((x.total - x.failed) / max) * 60);
        var fH = Math.round((x.failed / max) * 60);
        html += '<div class="col" title="' + esc(x.ymd) + ' · 전체 ' + n(x.total) + ' · 실패 ' + n(x.failed) + '">' +
          '<i class="f" style="height:' + fH + 'px"></i>' +
          '<i style="height:' + okH + 'px"></i></div>';
      });
      html += '</div>';
    }

    // recent failures feed
    html += '<div class="sect">최근 미달성·오류 <small>최신 50건</small></div>';
    if (!recent.length) { html += '<p class="muted">데이터 없음</p>'; }
    else {
      html += '<div class="tblwrap"><table class="bo"><thead><tr>' +
        '<th>시각(UTC)</th><th>도구</th><th>결과</th><th>사유</th><th>언어</th><th>메타</th></tr></thead><tbody>';
      recent.forEach(function (r) {
        var meta = '';
        try { meta = r.meta && Object.keys(r.meta).length ? JSON.stringify(r.meta) : ''; } catch (e) {}
        html += '<tr><td>' + esc(r.ts) + '</td>' +
          '<td><b>' + esc(r.tool) + '</b></td>' +
          '<td><span class="tag ' + esc(r.outcome) + '">' + esc(r.outcome) + '</span></td>' +
          '<td>' + esc(r.reason || '') + '</td>' +
          '<td>' + esc(r.lang || '') + '</td>' +
          '<td><code class="meta">' + esc(meta) + '</code></td></tr>';
      });
      html += '</tbody></table></div>';
    }

    html += '<p class="muted" style="margin-top:22px">집계 시각: ' + esc((d.generated_at || '').replace('T', ' ').slice(0, 16)) +
      ' UTC · 기간 시작: ' + esc((d.since || '').replace('T', ' ').slice(0, 16)) + ' UTC</p>' +
      '<p class="muted">※ 초기 확인용 샘플(<code>meta.seed=true</code>) 몇 건이 포함되어 있을 수 있습니다.</p>';

    dash.innerHTML = html;
  }

  document.addEventListener('DOMContentLoaded', async function () {
    sb = window.mdtlAuthClient && window.mdtlAuthClient();
    if (!sb) { loading.textContent = '인증 모듈을 불러오지 못했습니다.'; return; }
    var s = await sb.auth.getSession();
    var user = s && s.data && s.data.session && s.data.session.user;
    if (!user) { location.href = (window.MDTL_BASE || '') + '/ko/login/'; return; }
    load();
  });
})();
</script>
</body>
</html>
