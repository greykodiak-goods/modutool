<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>가입하기 | 모두의툴</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="__ORIGIN__/signup/">
<link rel="alternate" hreflang="ko" href="__ORIGIN__/signup/">
<link rel="alternate" hreflang="en" href="__ORIGIN__/en/signup/">
<link rel="alternate" hreflang="x-default" href="__ORIGIN__/en/signup/">
<link rel="stylesheet" href="/assets/site.css">
<script src="/assets/site.js"></script>
<script src="/assets/auth-config.js"></script>
<script src="/assets/auth.js"></script>
</head>
<body>
<header id="site-header" class="site-header"></header>
<main style="max-width:440px">
  <h1 class="page-title">가입하기</h1>
  <p class="page-sub">가입하면 프리미엄 오픈 알림(사전등록 할인)을 받을 수 있습니다. 도구 사용에는 가입이 필요 없습니다.</p>
  <div class="card">
    <div id="notReady" style="display:none">
      <p>🛠️ 회원 기능은 오픈 준비 중입니다. 지금은 가입 없이 <a href="/">모든 도구</a>를 그대로 이용하세요.</p>
    </div>
    <form id="signupForm" class="calc-grid" style="display:none">
      <label class="field"><span>이메일</span><input type="email" id="email" required autocomplete="email"></label>
      <label class="field"><span>비밀번호 (8자 이상)</span><input type="password" id="password" required minlength="8" autocomplete="new-password"></label>
      <label style="font-size:13.5px;color:var(--text-soft);display:flex;gap:8px;align-items:flex-start">
        <input type="checkbox" id="agree" required style="margin-top:3px">
        <span><a href="/terms/">이용약관</a>과 <a href="/privacy/">개인정보처리방침</a>에 동의합니다.</span>
      </label>
      <button class="btn block" type="submit">가입하기</button>
      <div class="result" id="msg"></div>
      <p style="font-size:13.5px;color:var(--text-soft);margin:4px 0 0">이미 계정이 있나요? <a href="/login/">로그인</a></p>
    </form>
  </div>
</main>
<footer id="site-footer" class="site-footer"></footer>
<script src="/assets/vendor/supabase.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  var sb = window.mdtlAuthClient && window.mdtlAuthClient();
  if (!sb) { document.getElementById('notReady').style.display = ''; return; }
  var form = document.getElementById('signupForm');
  form.style.display = '';
  var msg = document.getElementById('msg');
  if (window.mdtlLoggedIn()) { location.href = '/account/'; return; }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    msg.className = 'result';
    var r = await sb.auth.signUp({
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
      options: { emailRedirectTo: location.origin + '/account/' },
    });
    if (r.error) { mdtlResult(msg, '❌ ' + r.error.message, true); return; }
    if (r.data && r.data.session) { await window.mdtlRefreshPlan(); location.href = '/account/'; return; }
    mdtlResult(msg, '✅ 확인 메일을 보냈습니다. 메일의 링크를 눌러 가입을 완료해 주세요.');
  });
});
</script>
</body>
</html>
