<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>내 계정 | 모두의툴</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="__ORIGIN__/account/">
<link rel="alternate" hreflang="ko" href="__ORIGIN__/account/">
<link rel="alternate" hreflang="en" href="__ORIGIN__/en/account/">
<link rel="alternate" hreflang="x-default" href="__ORIGIN__/en/account/">
<link rel="stylesheet" href="/assets/site.css">
<script src="/assets/site.js"></script>
<script src="/assets/auth-config.js"></script>
<script src="/assets/auth.js"></script>
</head>
<body>
<header id="site-header" class="site-header"></header>
<main style="max-width:520px">
  <h1 class="page-title">내 계정</h1>
  <div class="card">
    <div id="loading">불러오는 중…</div>
    <div id="panel" style="display:none">
      <div class="calc-out">
        <div class="num" id="planLabel">무료</div>
        <div class="sub" id="emailLabel"></div>
        <div class="sub" id="planNote"></div>
      </div>
      <div class="btn-row">
        <a class="btn" id="upBtn" href="/pricing/">프리미엄 알아보기</a>
        <button class="btn secondary" id="logoutBtn">로그아웃</button>
      </div>
    </div>
    <div class="result" id="msg"></div>
  </div>
</main>
<footer id="site-footer" class="site-footer"></footer>
<script src="/assets/vendor/supabase.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async function () {
  var loading = document.getElementById('loading');
  var sb = window.mdtlAuthClient && window.mdtlAuthClient();
  if (!sb) { loading.textContent = '회원 기능은 오픈 준비 중입니다.'; return; }
  var info = await window.mdtlRefreshPlan();
  if (!info) { location.href = '/login/'; return; }
  loading.style.display = 'none';
  document.getElementById('panel').style.display = '';
  document.getElementById('emailLabel').textContent = info.user.email;
  var premium = window.mdtlIsPremium();
  document.getElementById('planLabel').textContent = premium ? '프리미엄 ✓' : '무료';
  document.getElementById('planNote').textContent = premium
    ? '광고 없이 이용 중입니다. 감사합니다!'
    : '프리미엄 결제 오픈 시 이 이메일로 알려드립니다 (사전등록 할인 대상).';
  if (premium) document.getElementById('upBtn').style.display = 'none';
  document.getElementById('logoutBtn').addEventListener('click', async function () {
    await sb.auth.signOut();
    window.mdtlClearAuthCache();
    location.href = '/';
  });
});
</script>
</body>
</html>
