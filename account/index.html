<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My account | ThisIsMyPDF</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="__ORIGIN__/account/">
<link rel="alternate" hreflang="ko" href="__ORIGIN__/ko/account/">
<link rel="alternate" hreflang="en" href="__ORIGIN__/account/">
<link rel="alternate" hreflang="x-default" href="__ORIGIN__/account/">
<link rel="stylesheet" href="/assets/site.css">
<script src="/assets/site.js"></script>
<script src="/assets/auth-config.js"></script>
<script src="/assets/auth.js"></script>
</head>
<body>
<header id="site-header" class="site-header"></header>
<main style="max-width:520px">
  <h1 class="page-title">My account</h1>
  <div class="card">
    <div id="loading">Loading…</div>
    <div id="panel" style="display:none">
      <div class="calc-out">
        <div class="num" id="planLabel">Free</div>
        <div class="sub" id="emailLabel"></div>
        <div class="sub" id="planNote"></div>
      </div>
      <div class="btn-row">
        <a class="btn" id="upBtn" href="/pricing/">See Premium</a>
        <button class="btn secondary" id="logoutBtn">Log out</button>
      </div>
    </div>
    <div class="result" id="msg"></div>
  </div>
</main>
<footer id="site-footer" class="site-footer"></footer>
<script src="/assets/vendor/supabase.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async function () {
  var loading = document.getElementById('loading');
  var sb = window.mdtlAuthClient && window.mdtlAuthClient();
  if (!sb) { loading.textContent = 'Accounts are launching soon.'; return; }
  var info = await window.mdtlRefreshPlan();
  if (!info) { location.href = (window.MDTL_BASE||'') + '/login/'; return; }
  loading.style.display = 'none';
  document.getElementById('panel').style.display = '';
  document.getElementById('emailLabel').textContent = info.user.email;
  var premium = window.mdtlIsPremium();
  document.getElementById('planLabel').textContent = premium ? 'Premium ✓' : 'Free';
  document.getElementById('planNote').textContent = premium
    ? 'Enjoying ad-free. Thank you!'
    : 'We will email you when Premium payments launch (early-signup discount).';
  if (premium) document.getElementById('upBtn').style.display = 'none';
  document.getElementById('logoutBtn').addEventListener('click', async function () {
    await sb.auth.signOut();
    window.mdtlClearAuthCache();
    location.href = (window.MDTL_BASE||'') + '/';
  });
});
</script>
</body>
</html>
