<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>로그인 | ThisIsMyPDF</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://greykodiak-goods.github.io/modutool/ko/login/">
<link rel="alternate" hreflang="ko" href="https://greykodiak-goods.github.io/modutool/ko/login/">
<link rel="alternate" hreflang="en" href="https://greykodiak-goods.github.io/modutool/login/">
<link rel="alternate" hreflang="x-default" href="https://greykodiak-goods.github.io/modutool/login/">
<script>window.MDTL_BASE='/modutool';</script>
<link rel="stylesheet" href="/modutool/assets/site.css">
<script src="/modutool/assets/site.js"></script>
<script src="/modutool/assets/auth-config.js"></script>
<script src="/modutool/assets/auth.js"></script>
</head>
<body>
<header id="site-header" class="site-header"></header>
<main style="max-width:440px">
  <h1 class="page-title">로그인</h1>
  <p class="page-sub">프리미엄 오픈 알림과 계정 기능을 위한 로그인입니다. 도구는 로그인 없이도 전부 쓸 수 있습니다.</p>
  <div class="card">
    <div id="notReady" style="display:none">
      <p>🛠️ 회원 기능은 오픈 준비 중입니다. 지금은 가입 없이 <a href="/modutool/ko/">모든 도구</a>를 그대로 이용하세요.</p>
    </div>
    <form id="loginForm" class="calc-grid" style="display:none">
      <button class="btn-google" type="button" id="googleBtn"><svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg><span>Google로 계속하기</span></button>
            <div class="auth-or">또는</div>
      <label class="field"><span>이메일</span><input type="email" id="email" required autocomplete="email"></label>
      <label class="field"><span>비밀번호</span><input type="password" id="password" required autocomplete="current-password"></label>
      <button class="btn block" type="submit">로그인</button>
      <button class="btn secondary block" type="button" id="magicBtn">비밀번호 없이 이메일 링크로 로그인</button>
      <div class="result" id="msg"></div>
      <p style="font-size:13.5px;color:var(--text-soft);margin:4px 0 0">계정이 없나요? <a href="/modutool/ko/signup/">가입하기</a></p>
    </form>
  </div>
</main>
<footer id="site-footer" class="site-footer"></footer>
<script src="/modutool/assets/vendor/supabase.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  var sb = window.mdtlAuthClient && window.mdtlAuthClient();
  if (!sb) { document.getElementById('notReady').style.display = ''; return; }
  var form = document.getElementById('loginForm');
  form.style.display = '';
  var gbtn = document.getElementById('googleBtn');
  if (gbtn) gbtn.addEventListener('click', async function () {
    msg.className = 'result';
    var r = await window.mdtlSignInWithGoogle();
    if (r && r.error) { mdtlResult(msg, '❌ ' + (r.error.message === 'auth-not-ready' ? '회원 기능 준비 중입니다.' : r.error.message), true); }
  });
  var msg = document.getElementById('msg');
  if (window.mdtlLoggedIn()) { location.href = (window.MDTL_BASE||'') + '/ko/account/'; return; }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    msg.className = 'result';
    var r = await sb.auth.signInWithPassword({
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
    });
    if (r.error) { mdtlResult(msg, '❌ ' + (r.error.message === 'Invalid login credentials' ? '이메일 또는 비밀번호가 올바르지 않습니다.' : r.error.message), true); return; }
    await window.mdtlRefreshPlan();
    location.href = (window.MDTL_BASE||'') + '/ko/account/';
  });

  document.getElementById('magicBtn').addEventListener('click', async function () {
    var email = document.getElementById('email').value.trim();
    if (!email) { mdtlResult(msg, '이메일을 먼저 입력해 주세요.', true); return; }
    var r = await sb.auth.signInWithOtp({ email: email, options: { emailRedirectTo: location.origin + (window.MDTL_BASE||'') + '/ko/account/' } });
    if (r.error) { mdtlResult(msg, '❌ ' + r.error.message, true); return; }
    mdtlResult(msg, '✅ 로그인 링크를 이메일로 보냈습니다. 메일함을 확인해 주세요.');
  });
});
</script>
</body>
</html>
