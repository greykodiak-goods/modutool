# Netlify 배포 — 세션이 Netlify MCP에서 발급받은 서명 URL(proxy_path)로 업로드+빌드.
# 개발 컨테이너는 외부 업로드가 프록시 정책으로 막혀 있어, 네트워크가 열린 GH 러너에서 실행한다.
# 트리거: 세션이 workflow_dispatch로 site_id/proxy_path를 넘겨 호출 (수동 실행도 동일).
name: Deploy to Netlify
on:
  workflow_dispatch:
    inputs:
      site_id:
        description: "Netlify site ID"
        required: true
      proxy_path:
        description: "Netlify MCP signed proxy path URL"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Deploy via Netlify MCP CLI
        run: npx -y @netlify/mcp@latest --site-id "${{ inputs.site_id }}" --proxy-path "${{ inputs.proxy_path }}"
