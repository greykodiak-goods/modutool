# 라이브 사이트 점검 — 개발 컨테이너는 외부망이 막혀 있어, 러너에서 실URL 응답을 검증한다.
name: Live site check
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "검사할 사이트 베이스 URL (끝 슬래시 없이)"
        required: true
        default: "https://greykodiak-goods.github.io/modutool"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check pages
        run: |
          BASE="${{ inputs.base_url }}"
          fail=0
          for p in "/" "/ko/" "/pdf/" "/pdf/ko/" "/pdf/pdf-merge/" "/pdf/pdf-compress/" "/pdf/pdf-sign/" "/pdf/pricing/" "/pdf/login/" "/pdf/admin/" "/img/" "/img/ko/" "/img/image-compress/" "/img/image-redact/" "/img/image-exif/" "/calc/" "/calc/age-calculator/" "/calc/vat-calculator/" "/calc/interest-calculator/" "/calc/unit-converter/" "/calc/qr-generator/" "/calc/password-generator/" "/calc/text-diff/" "/sitemap.xml" "/robots.txt" "/pdf/sitemap.xml" "/pdf/assets/site.js" "/pdf/assets/vendor/pdf-lib.min.js" "/calc/assets/vendor/qrcode-generator.js" "/pdf-merge/" "/ko/image-compress/"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L "$BASE$p")
            echo "$code  $BASE$p"
            [ "$code" = "200" ] || fail=1
          done
          echo "--- portal lists all three brands ---"
          for b in ThisIsMyPDF ThisIsMyIMG ThisIsMyCalculator; do
            curl -sL "$BASE/" | grep -q "$b" && echo "portal: $b OK" || { echo "portal: $b MISSING"; fail=1; }
          done
          echo "--- subsite brand + canonical ---"
          curl -sL "$BASE/img/" | grep -o "ThisIsMyIMG" | head -1 || fail=1
          curl -sL "$BASE/pdf/pdf-merge/" | grep -o '<link rel="canonical" href="[^"]*"' || fail=1
          echo "--- old URL redirects to new brand path ---"
          curl -sL "$BASE/pdf-merge/" | grep -q "url=$BASE/pdf/pdf-merge/" && echo "redirect stub OK" || { echo "redirect stub BROKEN"; fail=1; }
          echo "--- telemetry wired ---"
          curl -sL "$BASE/pdf/assets/site.js" | grep -q "mdtlLogEvent" && echo "site.js: mdtlLogEvent OK" || { echo "site.js: mdtlLogEvent MISSING"; fail=1; }
          echo "--- admin noindex + not in sitemap ---"
          curl -sL "$BASE/pdf/admin/" | grep -q "noindex" && echo "admin: noindex OK" || { echo "admin: noindex MISSING"; fail=1; }
          curl -sL "$BASE/pdf/sitemap.xml" | grep -q "/admin/" && { echo "admin leaked into sitemap"; fail=1; } || echo "admin absent from sitemap OK"
          echo "--- supabase auth reachable (회원 백엔드) ---"
          curl -s -o /dev/null -w "auth health: %{http_code}\n" "https://gysvtgnpacqjpdijbcaw.supabase.co/auth/v1/health" -H "apikey: sb_publishable_pWcuYOmFtXdL6oL_68f4pg_-d__ocoT"
          exit $fail
      - name: Telemetry backend E2E (anon INSERT allowed, SELECT denied, dashboard gated)
        run: |
          SB="https://gysvtgnpacqjpdijbcaw.supabase.co"
          KEY="sb_publishable_pWcuYOmFtXdL6oL_68f4pg_-d__ocoT"
          fail=0
          echo "--- anon INSERT (expect 201) ---"
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$SB/rest/v1/tool_events" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY" -H "Content-Type: application/json" -H "Prefer: return=minimal" \
            --data '{"tool":"live-check","outcome":"error","reason":"ci_e2e","lang":"en","site":"pdf","ua":"ci/runner","meta":{"seed":true}}')
          echo "insert: $code"; [ "$code" = "201" ] || fail=1
          echo "--- anon SELECT (expect empty [] — RLS blocks read) ---"
          body=$(curl -s "$SB/rest/v1/tool_events?select=tool&limit=1" -H "apikey: $KEY" -H "Authorization: Bearer $KEY")
          echo "select body: $body"; [ "$body" = "[]" ] || { echo "RLS read not blocked!"; fail=1; }
          echo "--- anon dashboard RPC (expect NOT 200 — admin gated) ---"
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$SB/rest/v1/rpc/mdtl_tool_dashboard" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY" -H "Content-Type: application/json" --data '{"days":30}')
          echo "rpc: $code"; [ "$code" = "200" ] && { echo "dashboard NOT gated!"; fail=1; } || echo "dashboard gated OK"
          exit $fail
