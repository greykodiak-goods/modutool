# Netlify 배포 설정 — dist/를 게시 (빌드: node scripts/build.mjs <도메인>)
[build]
  command = "node scripts/build.mjs"
  publish = "dist"

[build.environment]
  DEPLOY_ORIGIN = "https://thisismypdf.netlify.app"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
