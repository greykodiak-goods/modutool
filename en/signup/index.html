<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign up | ThisIsMyPDF</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="__ORIGIN__/en/signup/">
<link rel="alternate" hreflang="ko" href="__ORIGIN__/signup/">
<link rel="alternate" hreflang="en" href="__ORIGIN__/en/signup/">
<link rel="alternate" hreflang="x-default" href="__ORIGIN__/en/signup/">
<link rel="stylesheet" href="/assets/site.css">
<script src="/assets/site.js"></script>
<script src="/assets/auth-config.js"></script>
<script src="/assets/auth.js"></script>
</head>
<body>
<header id="site-header" class="site-header"></header>
<main style="max-width:440px">
  <h1 class="page-title">Sign up</h1>
  <p class="page-sub">Sign up for the Premium launch alert (with an early discount). No account is needed to use the tools.</p>
  <div class="card">
    <div id="notReady" style="display:none">
      <p>🛠️ Accounts are launching soon. Meanwhile, use <a href="/en/">every tool</a> without signing up.</p>
    </div>
    <form id="signupForm" class="calc-grid" style="display:none">
      <label class="field"><span>Email</span><input type="email" id="email" required autocomplete="email"></label>
      <label class="field"><span>Password (8+ characters)</span><input type="password" id="password" required minlength="8" autocomplete="new-password"></label>
      <label style="font-size:13.5px;color:var(--text-soft);display:flex;gap:8px;align-items:flex-start">
        <input type="checkbox" id="agree" required style="margin-top:3px">
        <span>I agree to the <a href="/en/terms/">Terms</a> and <a href="/en/privacy/">Privacy Policy</a>.</span>
      </label>
      <button class="btn block" type="submit">Create account</button>
      <div class="result" id="msg"></div>
      <p style="font-size:13.5px;color:var(--text-soft);margin:4px 0 0">Already have an account? <a href="/en/login/">Log in</a></p>
    </form>
  </div>
</main>
<footer id="site-footer" class="site-footer"></footer>
<script src="/assets/vendor/supabase.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  var sb = window.mdtlAuthClient && window.mdtlAuthClient();
  if (!sb) { document.getElementById('notReady').style.display = ''; return; }
  var form = document.getElementById('signupForm');
  form.style.display = '';
  var msg = document.getElementById('msg');
  if (window.mdtlLoggedIn()) { location.href = (window.MDTL_BASE||'') + '/en/account/'; return; }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    msg.className = 'result';
    var r = await sb.auth.signUp({
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
      options: { emailRedirectTo: location.origin + (window.MDTL_BASE||'') + '/en/account/' },
    });
    if (r.error) { mdtlResult(msg, '❌ ' + r.error.message, true); return; }
    if (r.data && r.data.session) { await window.mdtlRefreshPlan(); location.href = (window.MDTL_BASE||'') + '/en/account/'; return; }
    mdtlResult(msg, '✅ Confirmation email sent — click the link to finish signing up.');
  });
});
</script>
</body>
</html>
